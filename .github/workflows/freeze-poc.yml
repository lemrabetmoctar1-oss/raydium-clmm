name: Freeze POC
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI (built from source, avoids GLIBC issues)
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.32.1 anchor-cli --locked --force

      - name: Verify tool versions
        run: |
          anchor --version
          solana --version
          rustc --version

      - name: Build program (generates IDL too)
        run: anchor build

      - name: Show generated IDL
        run: cat target/idl/*.json

      - name: Run test
        run: cargo test --package raydium-clmm --test freeze_authority_poc -- --nocapture
