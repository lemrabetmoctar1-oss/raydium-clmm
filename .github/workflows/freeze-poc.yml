name: Freeze POC
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI (built from source, avoids GLIBC issues)
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.32.1 anchor-cli --locked --force

      - name: Verify tool versions
        run: |
          anchor --version
          solana --version
          rustc --version

      - name: Build program (generates IDL too)
        run: anchor build

      - name: Show generated IDL
        run: cat target/idl/*.json

      - name: Extract specific instruction IDL details
        run: |
          cat target/idl/*.json | python3 -c "
          import json, sys
          idl = json.load(sys.stdin)
          for ix in idl['instructions']:
              if ix['name'] in ['open_position_with_token22_nft', 'open_position_v2', 'increase_liquidity_v2']:
                  print('=== ' + ix['name'] + ' ===')
                  print(json.dumps(ix, indent=2))
          "

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: yarn install || npm install

      - name: Run TypeScript PoC test
        run: yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/freeze_authority.test.ts
